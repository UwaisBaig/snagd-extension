<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <!-- NAV HEADER -->
    <header id="tt-header">
      <div id="tt-logo-wrap">
        <svg class="tt-logo-icon" width="18" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 11.5C7 8 10 5 14 5C17.5 5 19 6.5 19 8.5C19 11.5 15.5 12.5 11.5 13" stroke="#0D9488" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 12.5C17 16 14 19 10 19C6.5 19 5 17.5 5 15.5C5 12.5 8.5 11.5 12.5 11" stroke="#0D9488" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="tt-logo-text">Snagd</span>
      </div>

      <nav id="tt-nav">
        <button class="tt-nav-item" data-tab="inbox" title="Inbox" aria-label="Inbox">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
          <span>Inbox</span>
        </button>
        <button class="tt-nav-item tt-active" data-tab="tasks" title="My Tasks" aria-label="My Tasks">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><polyline points="12 8 12 12 16 14"></polyline></svg>
          <span>My Tasks</span>
        </button>
        <button class="tt-nav-item" data-tab="projects" title="Projects" aria-label="Projects">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <span>Projects</span>
        </button>
        <button class="tt-nav-item" data-tab="activity" title="Activity" aria-label="Activity">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
          <span>Activity</span>
        </button>
        <button class="tt-nav-item" id="tt-nav-settings" title="Settings" aria-label="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span>Settings</span>
        </button>
      </nav>

      <div id="tt-header-right">
        <button id="tt-chevron-btn" aria-label="Expand menu" title="Menu">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
      </div>
    </header>

    <!-- SEARCH & CONTROLS ROW -->
    <div id="tt-controls-row">
      <div id="tt-layout-indicator" title="Grid Layout">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
      </div>
      <div id="tt-search-wrap">
        <input id="tt-search" type="text" placeholder="Search tasks..." autocomplete="off" spellcheck="false" aria-label="Search tasks" />
        <button id="tt-search-clear" aria-label="Clear search">&#x2715;</button>
      </div>
      <span id="tt-badge">0 tasks</span>
      <span id="tt-active-label">Active task</span>
    </div>

    <!-- FILTER TABS -->
    <div id="tt-filters" role="tablist">
      <button class="tt-filter-tab tt-active" data-filter="all" role="tab">All <span class="tt-tab-count" id="count-all"></span></button>
      <button class="tt-filter-tab" data-filter="active" role="tab">Active <span class="tt-tab-count" id="count-active"></span></button>
      <button class="tt-filter-tab" data-filter="completed" role="tab">Completed <span class="tt-tab-count" id="count-completed"></span></button>
    </div>

    <!-- TABLE HEADERS -->
    <div id="tt-table-header">
      <span class="col-task">Task</span>
      <span class="col-due">Due Date</span>
      <span class="col-priority">Priority</span>
      <span class="col-notes">Notes</span>
    </div>

    <!-- TASK LIST -->
    <div id="tt-task-list" role="list"></div>

    <!-- PROJECTS VIEW CONTAINER -->
    <div id="tt-projects-view" hidden></div>

    <!-- ACTIVITY VIEW CONTAINER -->
    <div id="tt-activity-view" hidden></div>

    <!-- EMPTY STATE -->
    <div id="tt-empty" hidden>
      <svg width="64" height="64" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="8" y="20" width="40" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="2"/>
        <rect x="8" y="14" width="18" height="8" rx="3" fill="#0F172A" stroke="#334155" stroke-width="2"/>
        <path d="M52 32 L62 32" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M58 27 L63 32 L58 37" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="56" y="40" width="14" height="14" rx="3" fill="#1E293B" stroke="#0D9488" stroke-width="1.5"/>
        <path d="M59 47 L62 50 L68 44" stroke="#0D9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p id="tt-empty-title">No tasks yet</p>
      <p id="tt-empty-sub">Right-click any page &rarr; Save tab as task</p>
    </div>

    <!-- FOOTER -->
    <footer id="tt-footer">
      <a href="https://buymeacoffee.com/uwaisbaig" target="_blank" rel="noopener noreferrer" id="tt-bmc-link">☕ Buy me a coffee</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
